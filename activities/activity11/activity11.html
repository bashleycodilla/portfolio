<!DOCTYPE html>
<html>
<head>
    <title>Activity 11</title>
    <script src="../../script.js"></script>
</head>
<body>
    <div id="forSection">
        <h2>For Loop</h2>
        <form id="forForm">
            <label>Enter Number:</label>
            <input type="number" id="forCount"><br><br>
            <label>Enter Text:</label>
            <input type="text" id="forText"><br><br>
            <button type="button" onclick="showFor()">Show</button>
            <button type="button" onclick="clearFor()">Clear</button>
        </form>
        <div id="forOutput"></div> </div>
 
    <hr>
 
    <div id="whileSection">
        <h2>While Loop</h2>
        <form id="whileForm">
            <label>Enter Number:</label>
            <input type="number" id="whileCount"><br><br>
            <label>Enter Text:</label>
            <input type="text" id="whileText"><br><br>
            <button type="button" onclick="showWhile()">Show</button>
            <button type="button" onclick="clearWhile()">Clear</button>
        </form>
        <div id="whileOutput"></div> </div>
 
   
    <div id="DowhileSection">
    <h2>Do-While Loop</h2>
    <form id="dowhileForm">
        <label>Enter Number:</label>
        <input type="number" id="dowhileCount"><br><br>
        <label>Enter Text:</label>
        <input type="text" id="dowhileText"><br><br>
       
        <button type="button" onclick="showDoWhile()">Show</button>
        <button type="button" onclick="clearDoWhile()">Clear</button>
    </form>
    <div id="dowhileOutput"></div>
</div>
</body>
</html>

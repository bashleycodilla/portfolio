<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="stylescontact.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div class="contact-wrapper">
        <h2 class="section-title">Get in Touch</h2>
        <p class="intro-text">Have a question or want to connect? Send me a message below!</p>

        <div class="form-card">
            <!-- Status message container -->
            <div id="status-msg" class="status-msg hidden"></div>

            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Your Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="5" required></textarea>
            </div>

            <button id="send-btn" type="button" onclick="sendEmail()">Send Message ✉</button>
        </div>

        <div class="find-me">
            <h3>Find Me Here</h3>
            <div class="social-links">
                <a href="https://www.facebook.com/bashley.codilla.5" target="_blank">📘 Facebook</a>
                <a href="https://github.com/bashleycodilla" target="_blank">🐙 GitHub</a>
                <a href="mailto:rovidecodilla@gmail.com">📧 Email</a>
            </div>
        </div>
    </div>

    <script>
    // Initialize EmailJS with your verified Public Key
    function main() {
        if (typeof emailjs !== 'undefined') {
            emailjs.init("7uUEQ5b-qtRSZmy5D"); 
        }
    }

    function sendEmail() {
        var name    = document.getElementById('name').value.trim();
        var email   = document.getElementById('email').value.trim();
        var message = document.getElementById('message').value.trim();
        var btn     = document.getElementById('send-btn');

        // Basic validation
        if (!name || !email || !message) {
            showStatus('Please fill in all fields.', 'error');
            return;
        }

        // Visual feedback during sending
        btn.textContent = 'Sending...';
        btn.disabled = true;

        // Send using your specific Service and Template IDs
        emailjs.send("service_gicjmav", "1ss7c8m", {
            from_name:  name,
            from_email: email,
            message:    message
        })
        .then(function () {
            showStatus('Message sent! I will get back to you soon. 😊', 'success');
            // Clear the form
            document.getElementById('name').value    = '';
            document.getElementById('email').value   = '';
            document.getElementById('message').value = '';
            btn.textContent = 'Send Message ✉';
            btn.disabled = false;
        })
        .catch(function (error) {
            showStatus('Oops! Something went wrong. Please try again.', 'error');
            console.error('EmailJS error:', error);
            btn.textContent = 'Send Message ✉';
            btn.disabled = false;
        });
    }

    function showStatus(message, type) {
        var status = document.getElementById('status-msg');
        if (!status) return;
        status.textContent = message;
        status.className = 'status-msg ' + type;
        // Ensure the message is visible
        status.classList.remove('hidden');
    }

    window.addEventListener('load', main);
    </script>

    <div class="bottom-section">
        <div class="map-container">
            <h3>FIND ME!</h3>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d981.3998740509405!2d123.88020927017628!3d10.293818187760804!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33a99c015a4bf233%3A0x95d783198f4634f8!2sCebu%20Institute%20of%20Technology%20-%20University!5e0!3m2!1sen!2sph!4v1773067263065!5m2!1sen!2sph" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

</body>
</html>
